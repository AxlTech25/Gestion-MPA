# Excluir dependencias, builds, datos y binarios
sonar.exclusions=**/node_modules/**,**/dist/**,**/vendor/**,**/__pycache__/**,**/*.pyc,**/ml/models/**,**/ml/data/**,**/ml/notebooks/**,**/documents/**,**/backend/tools/**,**/*.csv,**/*.joblib,**/*.sql

